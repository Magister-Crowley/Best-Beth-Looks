<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whimsy Goth "Best Beth Looks" Tier List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0713;
            --bg-velvet: #160e26;
            --bg-row: #22163a;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --amethyst: #9966cc;
            --purple-glow: rgba(153, 102, 204, 0.6);
            --text-light: #f5f2eb;
            
            /* Jewel Tone Tier Colors */
            --tier-s: #800020; /* Burgundy */
            --tier-a: #cc5500; /* Burnt Amber */
            --tier-b: #4b0082; /* Indigo */
            --tier-c: #004b49; /* Deep Teal */
            --tier-d: #556b2f; /* Dark Olive */
            --tier-f: #3a3a3a; /* Charcoal */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-light);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow), 0 0 20px var(--purple-glow);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header p {
            font-style: italic;
            color: #bfaecf;
            font-size: 0.95rem;
        }

        /* Tier List Container */
        .tier-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-velvet);
            border: 1px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7), 0 0 15px var(--purple-glow);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .tier-row {
            display: flex;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            min-height: 110px;
            background: var(--bg-row);
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.8rem;
            width: 100px;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            user-select: none;
        }

        /* Specific Tier Colors */
        [data-tier="S"] .tier-label { background-color: var(--tier-s); }
        [data-tier="A"] .tier-label { background-color: var(--tier-a); }
        [data-tier="B"] .tier-label { background-color: var(--tier-b); }
        [data-tier="C"] .tier-label { background-color: var(--tier-c); }
        [data-tier="D"] .tier-label { background-color: var(--tier-d); }
        [data-tier="F"] .tier-label { background-color: var(--tier-f); }

        .tier-dropzone {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px;
            gap: 12px;
            flex-grow: 1;
            transition: background-color 0.2s ease;
            min-height: 90px;
        }

        .tier-dropzone.drag-over {
            background-color: rgba(153, 102, 204, 0.15);
            outline: 1px dashed var(--gold);
        }

        /* Image Items */
        .tier-item {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            cursor: grab;
            position: relative;
            touch-action: none; /* Crucial for Pointer Events API on mobile */
            user-select: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            background-size: cover;
            background-position: center;
        }

        .tier-item:active {
            cursor: grabbing;
        }

        .tier-item.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }

        /* Cosmic/Celestial border decorations for items */
        .tier-item::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            pointer-events: none;
        }

        /* Bottom Control Framework & Item Pool */
        .pool-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-velvet);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        .pool-header {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .item-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 130px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            align-items: center;
            justify-content: center;
        }

        /* Custom Modal / Toast Notification */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 7, 19, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-velvet);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px var(--gold-glow), 0 0 15px var(--purple-glow);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2daf0;
            margin-bottom: 25px;
        }

        .modal-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .modal-btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            body { padding: 10px; }
            header h1 { font-size: 1.8rem; }
            .tier-row { flex-direction: column; min-height: auto; }
            .tier-label { width: 100%; height: 40px; min-height: 40px; border-right: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
            .tier-dropzone { min-height: 80px; justify-content: center; }
            .item-pool { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Best Beth Looks</h1>
        <p>A Whimsy Goth Sorting Rite</p>
    </header>

    <div class="tier-container">
        <div class="tier-row" data-tier="S">
            <div class="tier-label">S</div>
            <div class="tier-dropzone" id="tier-s"></div>
        </div>
        <div class="tier-row" data-tier="A">
            <div class="tier-label">A</div>
            <div class="tier-dropzone" id="tier-a"></div>
        </div>
        <div class="tier-row" data-tier="B">
            <div class="tier-label">B</div>
            <div class="tier-dropzone" id="tier-b"></div>
        </div>
        <div class="tier-row" data-tier="C">
            <div class="tier-label">C</div>
            <div class="tier-dropzone" id="tier-c"></div>
        </div>
        <div class="tier-row" data-tier="D">
            <div class="tier-label">D</div>
            <div class="tier-dropzone" id="tier-d"></div>
        </div>
        <div class="tier-row" data-tier="F">
            <div class="tier-label">F</div>
            <div class="tier-dropzone" id="tier-f"></div>
        </div>
    </div>

    <div class="pool-container">
        <div class="pool-header">✦ Unsorted Manifestations ✦</div>
        <div class="item-pool" id="pool-zone"></div>
    </div>

    <div class="modal-overlay" id="intercept-modal">
        <div class="modal-content">
            <div class="modal-icon">✦ ☾ ✦</div>
            <div class="modal-title">A Celestial Intervention</div>
            <div class="modal-text">"Error in user judgment: Beth looks stunning here. Minimum a tier material."</div>
            <button class="modal-btn" onclick="closeModal()">As it must be</button>
        </div>
    </div>

    <script>
        let itemIdCounter = 0;
        const poolZone = document.getElementById('pool-zone');
        const modal = document.getElementById('intercept-modal');
        const tierAZone = document.getElementById('tier-a');

        // Explicit structural image assets collection
        const defaultImages = [
            "453653396_2440871699445824_4671024868331652418_n.jpg",
            "470655849_1006393777961448_783466896411969680_n.jpg",
            "473974359_1027756262491866_8310733261504570733_n.jpg",
            "474752405_1031678885432937_6911386174357984143_n.jpg",
            "474766592_1033978765202949_3514587839909523597_n.jpg",
            "476038577_1036626581604834_994360019101546115_n.jpg",
            "475842338_1036607198273439_4531827522533514074_n.jpg",
            "skull kiss beth 2.jpg",
            "sacred oath beth.jpg",
            "greek goddess beth.jpg"
        ];

        // Track state for Touch/Pointer emulation fallback
        let activePointerItem = null;
        let initialOffset = { x: 0, y: 0 };

        // --- APPLICATION INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', () => {
            defaultImages.forEach(filename => {
                createTierItem(filename);
            });
        });

        function createTierItem(url) {
            const item = document.createElement('div');
            item.classList.add('tier-item');
            item.id = `item-${itemIdCounter++}`;
            item.style.backgroundImage = `url('${url}')`;
            
            // Set up HTML5 Desktop Drag Attributes
            item.draggable = true;

            // --- DESKTOP DRAG & DROP EVENTS ---
            item.addEventListener('dragstart', (e) => {
                item.classList.add('dragging');
                e.dataTransfer.setData('text/plain', item.id);
            });

            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
            });

            // --- MOBILE / POINTER EVENTS INTERACTION BRIDGE ---
            item.addEventListener('pointerdown', onPointerDown);

            poolZone.appendChild(item);
        }

        // --- DROPZONE TARGET EVENT LISTENERS (Desktop) ---
        document.querySelectorAll('.tier-dropzone, .item-pool').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                if(zone.classList.contains('tier-dropzone')) {
                    zone.classList.add('drag-over');
                }
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const itemId = e.dataTransfer.getData('text/plain');
                const draggedItem = document.getElementById(itemId);
                if (draggedItem) {
                    processPlacement(draggedItem, zone);
                }
            });
        });

        // --- PLACEMENT REDIRECTION ENGINE ---
        function processPlacement(item, targetZone) {
            // Check if the zone parent container defines a restricted tier
            const tierRow = targetZone.closest('.tier-row');
            const tierType = tierRow ? tierRow.getAttribute('data-tier') : 'POOL';

            if (['B', 'C', 'D', 'F'].includes(tierType)) {
                // Intercept logic: force redirect placement to A-Tier
                tierAZone.appendChild(item);
                showModal();
            } else {
                // Allowed paths (S, A, or Pool Zone)
                targetZone.appendChild(item);
            }
        }

        // --- INTERCEPT MODAL ACTIONS ---
        function showModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // --- POINTER EVENTS ENGINE (Flawless Mobile Drag-and-Drop) ---
        function onPointerDown(e) {
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            
            activePointerItem = e.currentTarget;
            activePointerItem.setPointerCapture(e.pointerId);
            activePointerItem.classList.add('dragging');
            
            const rect = activePointerItem.getBoundingClientRect();
            initialOffset = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            activePointerItem.style.position = 'fixed';
            activePointerItem.style.zIndex = '9999';
            moveAt(e.clientX, e.clientY);

            activePointerItem.addEventListener('pointermove', onPointerMove);
            activePointerItem.addEventListener('pointerup', onPointerUp);
        }

        function moveAt(clientX, clientY) {
            if (!activePointerItem) return;
            activePointerItem.style.left = `${clientX - initialOffset.x}px`;
            activePointerItem.style.top = `${clientY - initialOffset.y}px`;
        }

        function onPointerMove(e) {
            if (!activePointerItem) return;
            moveAt(e.clientX, e.clientY);
        }

        function onPointerUp(e) {
            if (!activePointerItem) return;

            activePointerItem.removeEventListener('pointermove', onPointerMove);
            activePointerItem.removeEventListener('pointerup', onPointerUp);
            
            activePointerItem.style.position = '';
            activePointerItem.style.zIndex = '';
            activePointerItem.style.left = '';
            activePointerItem.style.top = '';
            activePointerItem.classList.remove('dragging');

            activePointerItem.style.display = 'none';
            const elementUnderneath = document.elementFromPoint(e.clientX, e.clientY);
            activePointerItem.style.display = 'block';

            if (elementUnderneath) {
                const validZone = elementUnderneath.closest('.tier-dropzone') || elementUnderneath.closest('.item-pool');
                if (validZone) {
                    processPlacement(activePointerItem, validZone);
                    activePointerItem = null;
                    return;
                }
            }

            poolZone.appendChild(activePointerItem);
            activePointerItem = null;
        }
    </script>
</body>
</html>
